  <div class="relative">
  @if (!authService.isAuthenticated) {
    <div class="flex items-center gap-3">
      <a
        routerLink="/login"
        class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800"
      >
        Login
      </a>

      <a
        routerLink="/register"
        class="border px-4 py-2 rounded hover:bg-gray-100"
      >
        Register
      </a>
    </div>
  } @else {

    <!-- Dropdown Button -->
    <button
      (click)="toggleMenu()"
      class="flex items-center gap-2 border rounded-lg px-4 py-2 hover:bg-gray-100 transition"
    >
      <span>👤</span>
      <span>My Account</span>

      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M19 9l-7 7-7-7"
        />
      </svg>
    </button>

    <!-- Dropdown -->
    @if (isMenuOpen) {
      <div
        class="absolute right-0 mt-2 w-56 bg-white border rounded shadow-lg overflow-hidden z-50"
      >
        <a
          routerLink="/profile"
          (click)="closeMenu()"
          class="block px-4 py-3 hover:bg-gray-100"
        >
          👤 Profile
        </a>

        <a
          routerLink="/saved-jobs"
          (click)="closeMenu()"
          class="block px-4 py-3 hover:bg-gray-100"
        >
          📑 Saved Jobs
        </a>

        <hr>

        <button
          (click)="onLogout()"
          class="w-full text-left px-4 py-3 text-red-600 hover:bg-red-50 cursor-pointer"
        >
          🚪 Logout
        </button>
      </div>
    }

  }
</div>
