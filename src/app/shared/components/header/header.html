<nav class="bg-white shadow px-6 py-3 flex justify-between items-center">
  <a routerLink="/" class="flex items-center gap-2">
    <img src="/logo-test.jpg" alt="Logo" class="h-10 w-10" />
  </a>

  <div class="flex items-center gap-3">
    @if (!authService.isAuthenticated) {
      <a
        routerLink="/login"
        class="text-white bg-black px-4 py-2 rounded hover:bg-gray-700 cursor-pointer"
      >
        Login
      </a>

      <a routerLink="/register" class="border px-4 py-2 rounded hover:bg-gray-100 cursor-pointer">
        Register
      </a>
    } @else {
      <a routerLink="/saved-jobs" class="border px-4 py-2 rounded hover:bg-gray-100 cursor-pointer">
        Saved-Jobs
      </a>
      <a routerLink="/profile" class="border px-4 py-2 rounded hover:bg-gray-100 cursor-pointer">
        Profile
      </a>
      
      <button
        (click)="logout()"
        class="border px-4 py-2 rounded cursor-pointer bg-red-600 hover:bg-red-800 text-white"
      >
        Logout
      </button>
    }
  </div>
</nav>
