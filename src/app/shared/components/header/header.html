<nav
  class="bg-white shadow px-6 py-3 flex justify-between items-center fixed top-0 left-0 right-0 z-50"
>
  <a routerLink="/" class="flex items-center gap-2">
    <img src="/logo-test.jpg" alt="Logo" class="h-10 w-10" />
  </a>

  
  <div class="flex gap-7">
    <app-language-selector />
    @if (!authService.isAuthenticated) {
      <div class="flex items-center gap-3">
        @if (currentRoute === '/login') {
          <a routerLink="/register" class="border px-4 py-2 rounded hover:bg-gray-100">
              {{ 'nav.register' | translate }}
          </a>
        } @else {
          <a routerLink="/login" class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800">
             {{ 'nav.login' | translate }}
          </a>
        }
      </div>
    } @else {
      <!-- Dropdown Button -->
      <button
        (click)="toggleMenu()"
        class="flex items-center gap-2 border rounded-lg px-4 py-2 hover:bg-gray-100 transition cursor-pointer"
      >
        <span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="size-6"
          >
            <path
              fill-rule="evenodd"
              d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"
              clip-rule="evenodd"
            />
          </svg>
        </span>
        <span>
          {{ 'nav.myAccount' | translate }}
        </span>

        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Dropdown -->
      @if (isMenuOpen) {
        <div
          class="absolute right-0 mt-10 mr-4 w-56 bg-white border rounded shadow-lg overflow-hidden z-50"
        >
          <a routerLink="/profile" (click)="closeMenu()" class="block px-4 py-3 hover:bg-gray-100">
            <div class="flex gap-4">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="size-6"
              >
                <path
                  fill-rule="evenodd"
                  d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"
                  clip-rule="evenodd"
                />
              </svg>

              {{ 'nav.profile' | translate }}
            </div>
          </a>

          <a
            routerLink="/saved-jobs"
            (click)="closeMenu()"
            class="block px-4 py-3 hover:bg-gray-100"
          >
            <div class="flex gap-4">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="size-6"
              >
                <path
                  fill-rule="evenodd"
                  d="M6.32 2.577a49.255 49.255 0 0 1 11.36 0c1.497.174 2.57 1.46 2.57 2.93V21a.75.75 0 0 1-1.085.67L12 18.089l-7.165 3.583A.75.75 0 0 1 3.75 21V5.507c0-1.47 1.073-2.756 2.57-2.93Z"
                  clip-rule="evenodd"
                />
              </svg>

                {{ 'nav.savedJobs' | translate }}
            </div>
          </a>

          <hr />

          <button
            (click)="onLogout()"
            class="w-full text-left px-4 py-3 text-red-600 hover:bg-red-50 cursor-pointer"
          >
            <div class="flex gap-4">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="size-6"
              >
                <path
                  d="M10.375 2.25a4.125 4.125 0 1 0 0 8.25 4.125 4.125 0 0 0 0-8.25ZM10.375 12a7.125 7.125 0 0 0-7.124 7.247.75.75 0 0 0 .363.63 13.067 13.067 0 0 0 6.761 1.873c2.472 0 4.786-.684 6.76-1.873a.75.75 0 0 0 .364-.63l.001-.12v-.002A7.125 7.125 0 0 0 10.375 12ZM16 9.75a.75.75 0 0 0 0 1.5h6a.75.75 0 0 0 0-1.5h-6Z"
                />
              </svg>
              {{ 'nav.logout' | translate }}
            </div>
          </button>
        </div>
      }
    }
  </div>
</nav>
