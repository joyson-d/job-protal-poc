<div class="relative">
  <!-- Trigger -->
  <button
    type="button"
    (click)="toggle()"
    class="flex items-center gap-2 px-3 py-2 border rounded-lg hover:bg-gray-100 transition cursor-pointer"
  >
    <span class="text-lg">{{ selectedLanguage.flag }}</span>

    <span class="text-sm">
      {{ selectedLanguage.name }}
    </span>

    <svg
      class="w-4 h-4 transition-transform"
      [class.rotate-180]="isOpen()"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  @if (isOpen()) {
    <div class="absolute right-0 mt-2 w-44 bg-white border rounded-lg shadow-lg z-50">
      @for (language of languages; track language.code) {
        <button
          type="button"
          (click)="selectLanguage(language)"
          class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-100 text-left cursor-pointer"
        >
          <span>{{ language.flag }}</span>

          <span>{{ language.name }}</span>

          @if (selectedLanguage.code === language.code) {
            <span class="ml-auto text-blue-600">✓</span>
          }
        </button>
      }
    </div>
  }
</div>
