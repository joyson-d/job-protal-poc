<div class="min-h-screen flex justify-center sm:items-center">
  <div class="rounded-xl shadow p-6 w-full md:w-2/3 lg:w-1/3">
    <form
      class="flex flex-col gap-5 bg-white px-6 py-10 rounded"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
    >
      <h2 class="text-2xl font-semibold text-center">Welcome Back</h2>

      <!-- EMAIL -->
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        @if (email.touched && email.invalid) {
          <p class="text-red-500 mt-2">Email is invalid</p>
        }
      </div>

      <!-- PASSWORD -->
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        @if (password.touched && password.invalid) {
          <p class="text-red-500 mt-2">Password is invalid</p>
        }
      </div>

      @if (loginError()) {
        <div class="rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
          {{ loginError() }}
        </div>
      }

      <!-- SUBMIT -->
      <button
        type="submit"
        class="bg-gray-900 text-white py-2.5 rounded font-medium hover:bg-gray-700 transition"
      >
        Login
      </button>

      <!-- LINK -->
      <p class="text-sm text-center text-gray-600">
        Don't have an account?

        <a routerLink="/register" class="text-blue-600 hover:underline font-medium cursor-pointer">
          Register
        </a>
      </p>
    </form>
  </div>
</div>
