<details
  class="group overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm transition-all open:border-blue-500 open:shadow-md my-4"
>
  <summary class="flex cursor-pointer list-none items-center justify-between p-5">
    <div class="flex flex-col gap-2">
      <div class="flex flex-wrap items-center gap-2">
        <span class="rounded-full bg-gray-100 px-2 py-1 text-xs font-semibold text-gray-600">
          {{ question.category }}
        </span>

        @switch (question.difficulty) {
          @case ('Easy') {
            <span class="rounded-full bg-green-100 px-2 py-1 text-xs font-semibold text-green-700">
              Easy
            </span>
          }

          @case ('Medium') {
            <span
              class="rounded-full bg-yellow-100 px-2 py-1 text-xs font-semibold text-yellow-700"
            >
              Medium
            </span>
          }

          @case ('Hard') {
            <span class="rounded-full bg-red-100 px-2 py-1 text-xs font-semibold text-red-700">
              Hard
            </span>
          }
        }
      </div>

      <h2 class="text-lg font-semibold text-gray-900">
        {{ question.question }}
      </h2>
    </div>

    <!-- Arrow -->
    <svg
      class="h-5 w-5 text-gray-500 transition-transform duration-300 group-open:rotate-180"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7" />
    </svg>
  </summary>

  <!-- Answer -->
  <div class="border-t border-gray-100 bg-gray-50 p-5">
    <h3 class="mb-2 font-semibold text-gray-900">Answer</h3>

    <p class="leading-7 text-gray-700">
      {{ question.answer }}
    </p>
  </div>
</details>
