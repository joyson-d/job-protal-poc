<div class="min-h-screen bg-gray-50 p-4 lg:p-6 animate-pulse">
  <div class="max-w-7xl mx-auto">
    <!-- Search Bar -->
    <div class="flex flex-col md:flex-row gap-4 mb-6">
      <div class="h-11 flex-1 rounded bg-gray-300"></div>
      <div class="h-11 w-full md:w-56 rounded bg-gray-300"></div>
      <div class="h-11 w-28 rounded bg-gray-300"></div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
      <!-- Filters -->
      <aside class="hidden lg:block w-72 bg-white rounded-xl p-5 shadow">
        <div class="h-6 w-24 bg-gray-300 rounded mb-6"></div>

        <div class="space-y-4">
          @for (item of [1, 2, 3, 4, 5]; track item) {
            <div class="flex items-center gap-3">
              <div class="w-4 h-4 rounded bg-gray-300"></div>
              <div class="h-4 flex-1 rounded bg-gray-300"></div>
            </div>
          }
        </div>

        <div class="mt-8">
          <div class="h-5 w-32 bg-gray-300 rounded mb-4"></div>
          <div class="flex gap-2">
            <div class="h-10 flex-1 rounded bg-gray-300"></div>
            <div class="h-10 flex-1 rounded bg-gray-300"></div>
          </div>
        </div>
      </aside>

      <!-- Job Cards -->
      <main class="flex-1">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          @for (card of [1, 2, 3, 4, 5, 6]; track card) {
            <div class="bg-white rounded-xl p-5 shadow space-y-4">
              <div class="flex items-center gap-3">
                <div class="w-14 h-14 rounded-lg bg-gray-300"></div>

                <div class="flex-1 space-y-2">
                  <div class="h-5 w-3/4 rounded bg-gray-300"></div>
                  <div class="h-4 w-1/2 rounded bg-gray-200"></div>
                </div>
              </div>

              <div class="space-y-2">
                <div class="h-4 w-full rounded bg-gray-200"></div>
                <div class="h-4 w-5/6 rounded bg-gray-200"></div>
                <div class="h-4 w-2/3 rounded bg-gray-200"></div>
              </div>

              <div class="flex gap-2 pt-2">
                <div class="h-7 w-20 rounded-full bg-gray-200"></div>
                <div class="h-7 w-24 rounded-full bg-gray-200"></div>
              </div>

              <div class="h-10 rounded-lg bg-gray-300"></div>
            </div>
          }
        </div>
      </main>
    </div>
  </div>
</div>
