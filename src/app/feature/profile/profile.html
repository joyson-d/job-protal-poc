<div class="max-w-6xl mx-auto p-4 mt-20">
    <div class="flex flex-col md:flex-row gap-6">
        <div class="md:w-[30%] w-full">
      <div class="bg-white rounded-xl shadow p-4 sticky top-24">

        <button
          (click)="setTab('overview')"
          class="w-full text-left px-3 py-2 rounded mb-2"
          [class.bg-blue-100]="activeTab === 'overview'"
        >
          Personal Info
        </button>

        <button
          (click)="setTab('skills')"
          class="w-full text-left px-3 py-2 rounded mb-2"
          [class.bg-blue-100]="activeTab === 'skills'"
        >
          Skills
        </button>

        <button
          (click)="setTab('education')"
          class="w-full text-left px-3 py-2 rounded mb-2"
          [class.bg-blue-100]="activeTab === 'education'"
        >
          Education
        </button>

        <button
          (click)="setTab('experience')"
          class="w-full text-left px-3 py-2 rounded"
          [class.bg-blue-100]="activeTab === 'experience'"
        >
          Experience
        </button>

      </div>
    </div>

    <!-- CONTENT -->
    <div class="md:w-[70%] w-full">

      @if (activeTab === 'overview') {
        <app-overview />
      }

      @if (activeTab === 'skills') {
        <app-skills />
        
      }

      @if (activeTab === 'education') {
        <app-education />
      }

      @if (activeTab === 'experience') {
        <app-experience />
      }

    </div>
    </div>
</div>
