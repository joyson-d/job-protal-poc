<div class="bg-white border-t-2 p-6 max-sm:p-0">
  <h2 class="mb-4 text-xl font-semibold">
     {{ 'profile.resumeSection.title' | translate }}
  </h2>

  <div class="grid grid-cols-2 gap-4 w-full">
    <label
      for="resume-upload"
      class="flex items-center justify-center cursor-pointer rounded border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50 hover:border-gray-400 sm:px-4 sm:py-3"
    >
       {{ 'profile.resumeSection.chooseBtn' | translate }}
    </label>

    <input
      id="resume-upload"
      type="file"
      accept="application/pdf"
      (change)="onFileSelected($event)"
      class="hidden"
    />

    <div class="my-auto mx-auto">
      @if (selectedFile) {
        <span class="text-sm text-gray-600">
          {{
            selectedFile.name.length > 12
              ? (selectedFile.name | slice: 0 : 12) + '...'
              : selectedFile.name
          }}
        </span>
      } @else {
        <span class="text-sm text-gray-400"> {{ 'profile.resumeSection.noFile' | translate }} </span>
      }
    </div>
  </div>

  <div class="flex mt-4 w-full gap-6 max-md:justify-between">
    @if (resume) {
      <div class="flex ml-auto gap-4">
        <button
          (click)="viewResume()"
          class="rounded border border-gray-300 px-4 py-2 font-medium transition hover:bg-gray-100 cursor-pointer flex"
        >
           {{ 'profile.resumeSection.viewBtn' | translate }}
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="size-6"
          >
            <path
              fill-rule="evenodd"
              d="M3.75 3.375c0-1.036.84-1.875 1.875-1.875H9a3.75 3.75 0 0 1 3.75 3.75v1.875c0 1.036.84 1.875 1.875 1.875H16.5a3.75 3.75 0 0 1 3.75 3.75v7.875c0 1.035-.84 1.875-1.875 1.875H5.625a1.875 1.875 0 0 1-1.875-1.875V3.375Zm10.5 1.875a5.23 5.23 0 0 0-1.279-3.434 9.768 9.768 0 0 1 6.963 6.963A5.23 5.23 0 0 0 16.5 7.5h-1.875a.375.375 0 0 1-.375-.375V5.25Zm-3.75 5.56c0-1.336-1.616-2.005-2.56-1.06l-.22.22a.75.75 0 0 0 1.06 1.06l.22-.22v1.94h-.75a.75.75 0 0 0 0 1.5H9v3c0 .671.307 1.453 1.068 1.815a4.5 4.5 0 0 0 5.993-2.123c.233-.487.14-1-.136-1.37A1.459 1.459 0 0 0 14.757 15h-.507a.75.75 0 0 0 0 1.5h.349a2.999 2.999 0 0 1-3.887 1.21c-.091-.043-.212-.186-.212-.46v-3h5.25a.75.75 0 1 0 0-1.5H10.5v-1.94Z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <button
          (click)="removeResume()"
          class="rounded bg-red-500 px-4 py-2 font-medium text-white transition hover:bg-red-600 cursor-pointer flex"
        >
           {{ 'profile.resumeSection.removeBtn' | translate }}
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="size-6"
          >
            <path
              fill-rule="evenodd"
              d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
    } @else {
      <button
        [disabled]="!selectedFile"
        (click)="saveResume()"
        class="rounded bg-black px-4 py-2 font-medium text-white transition hover:bg-gray-800 disabled:cursor-not-allowed disabled:bg-gray-300 mt-4 ml-auto"
      >
          {{ 'profile.resumeSection.saveBtn' | translate }}
      </button>
    }
  </div>
</div>
