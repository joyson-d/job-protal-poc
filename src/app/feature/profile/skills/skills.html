<div class="bg-white p-6 rounded-xl shadow">
  <h2 class="text-xl font-semibold mb-4">Skills</h2>

  <div class="flex gap-2 mb-4">
    <input
      [(ngModel)]="skillInput"
      placeholder="Add skill"
      class="border px-3 py-2 rounded flex-1"
    />

    <button (click)="addSkill()" class="bg-black text-white px-4 rounded">Add</button>
  </div>

  <div class="flex flex-wrap gap-2">
    @for (skill of skills(); track skill) {
      <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded flex items-center gap-2">
        {{ skill }}

        <button (click)="removeSkill(skill)">✕</button>
      </span>
    }
  </div>

  <app-upload-resume />
</div>
